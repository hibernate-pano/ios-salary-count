name: SalaryCount
options:
  bundleIdPrefix: com.jasper
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans

settings:
  base:
    MARKETING_VERSION: "0.2"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: NO

targets:
  SalaryCount:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasper.salarycount
        PRODUCT_NAME: SalaryCount
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO

  SalaryCountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: SalaryCount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasper.salarycount.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SalaryCount:
    build:
      targets:
        SalaryCount: all
        SalaryCountTests: [test]
    test:
      targets:
        - SalaryCountTests

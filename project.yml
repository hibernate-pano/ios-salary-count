name: SalaryCount
options:
  bundleIdPrefix: com.jasper
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: zh-Hans

settings:
  base:
    MARKETING_VERSION: "0.7"
    CURRENT_PROJECT_VERSION: "8"
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: NO
    # 真机用免费个人账号自动签名。Team 在 Xcode 里选，或命令行传 DEVELOPMENT_TEAM。
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: T622K7RR78

targets:
  SalaryCount:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasper.salarycount
        PRODUCT_NAME: SalaryCount
        INFOPLIST_FILE: App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
    # 注：真机测试用免费账号，暂不含 Widget（App Group 需付费账号）。
    # Widget target 仍保留在仓库，付费账号后恢复 dependencies 与 entitlements 即可。

  SalaryCountTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: SalaryCount
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jasper.salarycount.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SalaryCount:
    build:
      targets:
        SalaryCount: all
        SalaryCountTests: [test]
    test:
      targets:
        - SalaryCountTests
